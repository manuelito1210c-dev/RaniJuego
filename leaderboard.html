<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susi's Quiz | Ranking Final</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cherry: { 950: '#140306', 900: '#2a060d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cherry-950 text-zinc-50 font-sans antialiased overflow-hidden selection:bg-rose-400/40 min-h-[100dvh] flex flex-col">

    <!-- Efectos Ambientales (Partículas y Glow) -->
    <div id="floating-hearts-container" class="absolute inset-0 z-0 overflow-hidden pointer-events-none"></div>
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[500px] bg-rose-600/15 rounded-full blur-[100px] z-0 animate-ambient-glow pointer-events-none"></div>
    <div class="absolute inset-0 z-0 bg-dot-pattern mask-radial-faded pointer-events-none"></div>

    <main class="relative z-10 w-full max-w-lg mx-auto h-[100dvh] flex flex-col px-5 py-8">
        
        <!-- Cabecera -->
        <header class="text-center mb-8 mt-4">
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-rose-500/20 bg-rose-950/40 backdrop-blur-md text-[10px] font-bold text-rose-300 tracking-widest uppercase shadow-[0_0_15px_rgba(225,29,72,0.15)] mb-4">
                <span class="flex h-2 w-2 rounded-full bg-rose-500 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                </span>
                Ranking en Tiempo Real
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-300 via-rose-500 to-red-600 drop-shadow-md">
                Salón de la Fama
            </h1>
        </header>

        <!-- Contenedor del Podio Asimétrico (Glassmorphism) -->
        <div class="glass-card w-full p-6 rounded-[2rem] flex items-end justify-center gap-3 mb-6 relative overflow-hidden shadow-2xl border border-rose-500/20 min-h-[220px]">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-px bg-gradient-to-r from-transparent via-rose-400/50 to-transparent"></div>
            
            <!-- 2do Lugar -->
            <div class="podium-bar flex flex-col items-center w-1/3" style="--target-height: 120px; animation-delay: 0.2s;">
                <div class="text-center mb-2 animate-fade-in">
                    <div class="text-sm font-bold text-zinc-200 truncate w-20" id="player-2-name">-</div>
                    <div class="text-xs text-rose-300 font-mono" id="player-2-score">0 pts</div>
                </div>
                <div class="w-full bg-gradient-to-t from-rose-950 to-rose-800 rounded-t-xl border-t border-rose-400/30 shadow-[0_0_20px_rgba(225,29,72,0.2)] flex items-end justify-center pb-2 h-full">
                    <span class="text-2xl font-black text-rose-400/50">2</span>
                </div>
            </div>

            <!-- 1er Lugar (Centro, más alto, destello dorado) -->
            <div class="podium-bar flex flex-col items-center w-1/3 z-10" style="--target-height: 160px; animation-delay: 0.4s;">
                <div class="text-center mb-2 animate-fade-in relative">
                    <div class="absolute -top-6 left-1/2 -translate-x-1/2 text-2xl drop-shadow-[0_0_10px_rgba(251,191,36,0.8)]">👑</div>
                    <div class="text-base font-extrabold text-white truncate w-24 drop-shadow-md" id="player-1-name">-</div>
                    <div class="text-sm text-yellow-400 font-mono font-bold" id="player-1-score">0 pts</div>
                </div>
                <div class="w-full bg-gradient-to-t from-rose-900 to-rose-600 rounded-t-2xl border-t-2 border-yellow-400/50 shadow-[0_0_30px_rgba(251,191,36,0.25)] flex items-end justify-center pb-3 h-full relative overflow-hidden">
                    <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent"></div>
                    <span class="text-4xl font-black text-yellow-400/80 drop-shadow-lg">1</span>
                </div>
            </div>

            <!-- 3er Lugar -->
            <div class="podium-bar flex flex-col items-center w-1/3" style="--target-height: 90px; animation-delay: 0.6s;">
                <div class="text-center mb-2 animate-fade-in">
                    <div class="text-sm font-bold text-zinc-300 truncate w-20" id="player-3-name">-</div>
                    <div class="text-xs text-rose-300/80 font-mono" id="player-3-score">0 pts</div>
                </div>
                <div class="w-full bg-gradient-to-t from-cherry-900 to-rose-900 rounded-t-xl border-t border-rose-500/20 flex items-end justify-center pb-2 h-full">
                    <span class="text-xl font-black text-rose-500/40">3</span>
                </div>
            </div>
        </div>

        <!-- Lista de los demás competidores -->
        <div class="flex-1 overflow-y-auto pr-2 pb-8 custom-scrollbar">
            <ul id="leaderboard-list" class="flex flex-col gap-3">
                <!-- Se inyectan vía JS -->
                <li class="text-center text-zinc-500 text-sm italic mt-8 animate-pulse">Esperando puntajes...</li>
            </ul>
        </div>


        <!-- Botón Volver a jugar -->
        <button id="btn-restart" class="btn-border-beam w-full py-4 text-sm font-bold tracking-widest text-zinc-100 uppercase relative overflow-hidden active:scale-95 transition-transform duration-200 mt-auto flex justify-center items-center">
            <span class="relative z-10 drop-shadow-md">Volver al Inicio</span>
            <span class="ripple absolute bg-white/30 rounded-full pointer-events-none transform scale-0"></span>
        </button>
    </main>

    <!-- 1. Motor de Base de Datos -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 2. Conexión Realtime y funciones globales de BD -->
    <script src="realtime.js"></script> 
    <!-- 3. Efectos visuales globales (Corazones y Ripple táctil) -->
    <script src="app.js"></script> 
    <!-- 4. Lógica específica del ranking -->
    <script src="leaderboard.js"></script> 
</body>
</html>
