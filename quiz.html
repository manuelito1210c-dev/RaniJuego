<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susi's Quiz | Pregunta Activa</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cherry: { 950: '#140306', 900: '#2a060d' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cherry-950 text-zinc-50 font-sans antialiased overflow-hidden">

    <!-- Fondo Tierno: Partículas y Luz Ambiental -->
    <div id="floating-hearts-container" class="absolute inset-0 z-0 overflow-hidden pointer-events-none"></div>
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-80 h-80 bg-rose-600/15 rounded-full blur-[80px] z-0 animate-ambient-glow pointer-events-none"></div>
    <div class="absolute inset-0 z-0 bg-dot-pattern mask-radial-faded pointer-events-none"></div>

    <main class="relative z-10 w-full h-[100dvh] flex flex-col px-5 py-8">
        
        <!-- Cabecera: Progreso y Puntaje -->
        <header class="flex justify-between items-center w-full mb-8">
            <div class="glass-badge px-4 py-2 rounded-full border border-rose-400/20 bg-rose-950/40 backdrop-blur-md text-xs font-semibold text-rose-200 shadow-sm">
                🍒 Pregunta 1 <span class="opacity-50">/ 15</span>
            </div>
            <div class="glass-badge px-4 py-2 rounded-full border border-rose-400/20 bg-rose-950/40 backdrop-blur-md text-xs font-bold text-white shadow-sm flex items-center gap-2">
                Puntos: <span id="score-display" class="text-rose-400">0</span>
            </div>
        </header>

        <!-- Barra de Temporizador (15 segundos) -->
        <div class="w-full bg-cherry-900/50 rounded-full h-2.5 mb-8 overflow-hidden border border-white/5 shadow-inner relative">
            <div id="timer-bar" class="bg-gradient-to-r from-rose-600 via-pink-500 to-rose-400 h-full w-full origin-left rounded-full shadow-[0_0_10px_rgba(244,63,94,0.5)]"></div>
        </div>

                <!-- Tarjeta de la Pregunta (Contenedor Dinámico) -->
        <div class="glass-card w-full p-6 rounded-[2rem] flex flex-col gap-4 mb-auto text-center relative overflow-hidden shadow-lg border border-rose-500/10">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-px bg-gradient-to-r from-transparent via-rose-400/30 to-transparent"></div>
            <h2 id="question-text" class="text-2xl md:text-3xl font-extrabold tracking-tight text-zinc-100 drop-shadow-md leading-snug transition-opacity duration-300">
                Cargando pregunta...
            </h2>
        </div>

        <!-- Opciones de Respuesta (Contenedor Dinámico) -->
        <div id="options-container" class="flex flex-col gap-4 w-full mt-8 pb-4 transition-opacity duration-300">
            <!-- JavaScript inyectará los botones táctiles aquí -->
        </div>

        <!-- Opciones de Respuesta -->
        <div id="options-container" class="flex flex-col gap-4 w-full mt-8 pb-4">
            <!-- Los botones se inyectarán vía JS, pero aquí está la estructura base para el diseño -->
            <button class="quiz-option glass-btn relative overflow-hidden w-full py-5 px-6 rounded-2xl border border-white/10 bg-white/5 text-left font-semibold text-zinc-200 transition-all duration-200 active:scale-[0.98] flex justify-between items-center group">
                <span class="relative z-10 pointer-events-none">Matambre a la pizza</span>
                <div class="w-5 h-5 rounded-full border-2 border-white/20 group-active:border-rose-400 relative z-10 pointer-events-none"></div>
                <span class="ripple absolute bg-white/20 rounded-full pointer-events-none transform scale-0"></span>
            </button>
            <button class="quiz-option glass-btn relative overflow-hidden w-full py-5 px-6 rounded-2xl border border-white/10 bg-white/5 text-left font-semibold text-zinc-200 transition-all duration-200 active:scale-[0.98] flex justify-between items-center group" data-correct="true">
                <span class="relative z-10 pointer-events-none">Empanadas de carne con limón</span>
                <div class="w-5 h-5 rounded-full border-2 border-white/20 group-active:border-rose-400 relative z-10 pointer-events-none"></div>
                <span class="ripple absolute bg-white/20 rounded-full pointer-events-none transform scale-0"></span>
            </button>
            <button class="quiz-option glass-btn relative overflow-hidden w-full py-5 px-6 rounded-2xl border border-white/10 bg-white/5 text-left font-semibold text-zinc-200 transition-all duration-200 active:scale-[0.98] flex justify-between items-center group">
                <span class="relative z-10 pointer-events-none">Pizza</span>
                <div class="w-5 h-5 rounded-full border-2 border-white/20 group-active:border-rose-400 relative z-10 pointer-events-none"></div>
                <span class="ripple absolute bg-white/20 rounded-full pointer-events-none transform scale-0"></span>
            </button>
            <button class="quiz-option glass-btn relative overflow-hidden w-full py-5 px-6 rounded-2xl border border-white/10 bg-white/5 text-left font-semibold text-zinc-200 transition-all duration-200 active:scale-[0.98] flex justify-between items-center group">
                <span class="relative z-10 pointer-events-none">Milanesas Napolitanas con Papas</span>
                <div class="w-5 h-5 rounded-full border-2 border-white/20 group-active:border-rose-400 relative z-10 pointer-events-none"></div>
                <span class="ripple absolute bg-white/20 rounded-full pointer-events-none transform scale-0"></span>
            </button>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
