<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Susi's Birthday | Cherry on Top</title>
    <!-- Tailwind CSS por CDN para prototipado rápido -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Enlace a tu hoja de estilos separada -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans antialiased selection:bg-rose-500/30 selection:text-white min-h-screen relative overflow-hidden flex flex-col justify-center items-center">

    <!-- Luz del cursor (Spotlight) -->
    <div id="mouse-glow" class="pointer-events-none absolute -top-1/2 -left-1/2 w-96 h-96 bg-rose-700/20 rounded-full blur-[100px] z-0 mix-blend-screen opacity-0 transition-opacity duration-500"></div>

    <!-- Fondo Interactivo Grid con Máscara -->
    <div class="absolute inset-0 z-0 bg-grid-pattern mask-radial-faded pointer-events-none"></div>

    <!-- Contenedor Principal (Glassmorphism) -->
    <main class="relative z-10 w-full max-w-lg mx-auto px-6 flex flex-col items-center">
        
        <!-- Badge Superior -->
        <div class="glow-hover inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-rose-500/20 bg-rose-950/30 backdrop-blur-md text-xs font-medium text-rose-200 mb-8">
            <span class="flex h-2 w-2 rounded-full bg-rose-500 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
            </span>
            The Ultimate Birthday Quiz
        </div>

        <!-- Título principal -->
        <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight mb-2 text-center">
            <span class="block text-zinc-100">¿Qué tanto</span>
            <span class="animate-gradient-text bg-clip-text text-transparent bg-gradient-to-r from-rose-400 via-red-500 to-rose-700">
                conoces a Susi?
            </span>
        </h1>

        <p class="text-lg text-zinc-400 font-light mb-10 text-center italic font-serif">
            "She's the Cherry on Top" 🍒
        </p>

        <!-- Tarjeta de Ingreso -->
        <div class="glass-card w-full p-8 rounded-3xl flex flex-col gap-6">
            <div class="flex flex-col gap-2">
                <label for="nickname" class="text-xs font-semibold text-rose-300/70 uppercase tracking-widest pl-1">Tu Nickname</label>
                <input type="text" id="nickname" placeholder="Ej: AmigoFiel" 
                       class="w-full bg-black/40 border border-white/5 rounded-xl px-4 py-3 text-white placeholder-zinc-600 focus:outline-none focus:border-rose-500/50 focus:ring-1 focus:ring-rose-500/50 transition-all duration-300">
            </div>

            <!-- Botón CTA con Border Beam -->
            <button id="btn-start" class="btn-border-beam w-full py-4 text-sm font-bold tracking-wide text-zinc-100 group flex justify-center items-center gap-2 uppercase">
                <span class="relative z-10">Ingresar al Juego</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 relative z-10 transition-transform duration-300 group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </button>
        </div>
    </main>

    <!-- Enlace a tu lógica JS separada -->
    <script src="app.js"></script>
</body>
</html>
